<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 360" font-family="'Segoe UI',Helvetica,Arial,sans-serif">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4DA3FF" stop-opacity="0.55"/>
      <stop offset="55%" stop-color="#4DA3FF" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#4DA3FF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ================= PHONE 1 — LOCK ================= -->
  <g transform="translate(30,28)">
    <rect width="206" height="258" rx="34" fill="#000000" stroke="#2A2E35" stroke-width="2"/>
    <circle cx="24" cy="24" r="3.5" fill="#4DA3FF"/>
    <text x="36" y="28" fill="#8C8C8C" font-size="10">SecureKey</text>

    <circle cx="103" cy="116" r="64" fill="url(#glow)"/>
    <circle cx="103" cy="116" r="42" fill="#14171C" stroke="#4DA3FF" stroke-width="2"/>
    <path d="M89 112 v-9 a14 14 0 0 1 28 0 v9" fill="none" stroke="#FFFFFF" stroke-width="5"/>
    <rect x="85" y="111" width="36" height="27" rx="5" fill="#FFFFFF"/>
    <circle cx="103" cy="122" r="3.6" fill="#14171C"/>
    <rect x="101.3" y="122" width="3.4" height="9" fill="#14171C"/>

    <text x="103" y="205" fill="#FFFFFF" font-size="23" font-weight="700" text-anchor="middle">SecureKey</text>
    <text x="103" y="232" fill="#6E7682" font-size="11" text-anchor="middle">tap to unlock</text>
  </g>
  <text x="133" y="312" fill="#8C8C8C" font-size="12" text-anchor="middle" font-weight="600">Lock</text>

  <!-- ================= PHONE 2 — HOME ================= -->
  <g transform="translate(277,28)">
    <rect width="206" height="258" rx="34" fill="#000000" stroke="#2A2E35" stroke-width="2"/>
    <circle cx="24" cy="24" r="3.5" fill="#4DA3FF"/>
    <text x="36" y="28" fill="#8C8C8C" font-size="10">SecureKey</text>

    <text x="20" y="58" fill="#FFFFFF" font-size="18" font-weight="700">My Vault</text>
    <text x="20" y="74" fill="#8C8C8C" font-size="9.5">24 passwords secured</text>

    <!-- tiles -->
    <g transform="translate(18,86)">
      <!-- Passwords (blue) -->
      <rect width="82" height="76" rx="14" fill="#14171C" stroke="#4DA3FF" stroke-width="1.3"/>
      <circle cx="41" cy="30" r="20" fill="#0E2233" stroke="#4DA3FF" stroke-width="1.3"/>
      <rect x="32" y="28" width="18" height="13" rx="3" fill="#FFFFFF"/>
      <path d="M35 28 v-4 a6 6 0 0 1 12 0 v4" fill="none" stroke="#FFFFFF" stroke-width="2.4"/>
      <text x="41" y="66" fill="#FFFFFF" font-size="11" text-anchor="middle" font-weight="600">Passwords</text>
    </g>
    <g transform="translate(106,86)">
      <!-- Add (green) -->
      <rect width="82" height="76" rx="14" fill="#14171C" stroke="#33D16A" stroke-width="1.3"/>
      <circle cx="41" cy="30" r="20" fill="#0E2A18" stroke="#33D16A" stroke-width="1.3"/>
      <rect x="32" y="28.5" width="18" height="4" rx="2" fill="#FFFFFF"/>
      <rect x="39" y="21.5" width="4" height="18" rx="2" fill="#FFFFFF"/>
      <text x="41" y="66" fill="#FFFFFF" font-size="11" text-anchor="middle" font-weight="600">Add New</text>
    </g>
    <g transform="translate(18,170)">
      <!-- Favorites (coral) -->
      <rect width="82" height="76" rx="14" fill="#14171C" stroke="#F26D6D" stroke-width="1.3"/>
      <circle cx="41" cy="30" r="20" fill="#2E1416" stroke="#F26D6D" stroke-width="1.3"/>
      <path d="M41 39 C 33 32 33 24 38 24 C 41 24 41 27 41 27 C 41 27 41 24 44 24 C 49 24 49 32 41 39 Z" fill="#FFFFFF"/>
      <text x="41" y="66" fill="#FFFFFF" font-size="11" text-anchor="middle" font-weight="600">Favorites</text>
    </g>
    <g transform="translate(106,170)">
      <!-- Settings (purple) -->
      <rect width="82" height="76" rx="14" fill="#14171C" stroke="#9A6BDE" stroke-width="1.3"/>
      <circle cx="41" cy="30" r="20" fill="#1E1630" stroke="#9A6BDE" stroke-width="1.3"/>
      <circle cx="41" cy="30" r="9" fill="none" stroke="#FFFFFF" stroke-width="3"/>
      <circle cx="41" cy="30" r="2.5" fill="#FFFFFF"/>
      <text x="41" y="66" fill="#FFFFFF" font-size="11" text-anchor="middle" font-weight="600">Settings</text>
    </g>
  </g>
  <text x="380" y="312" fill="#8C8C8C" font-size="12" text-anchor="middle" font-weight="600">Home</text>

  <!-- ================= PHONE 3 — DETAIL ================= -->
  <g transform="translate(524,28)">
    <rect width="206" height="258" rx="34" fill="#000000" stroke="#2A2E35" stroke-width="2"/>
    <circle cx="24" cy="24" r="3.5" fill="#4DA3FF"/>
    <text x="36" y="28" fill="#8C8C8C" font-size="10">SecureKey</text>

    <!-- nav -->
    <circle cx="28" cy="54" r="12" fill="#14171C" stroke="#2A2E35"/>
    <path d="M31 48 l-5 6 l5 6" fill="none" stroke="#FFFFFF" stroke-width="2.2"/>
    <text x="50" y="59" fill="#FFFFFF" font-size="14" font-weight="700">Password</text>

    <!-- rows -->
    <g transform="translate(16,76)">
      <rect width="174" height="40" rx="9" fill="#14171C" stroke="#2A2E35"/>
      <rect x="6" y="10" width="3" height="20" rx="1.5" fill="#4DA3FF"/>
      <text x="15" y="17" fill="#6E7682" font-size="8">TITLE</text>
      <text x="15" y="32" fill="#FFFFFF" font-size="13" font-weight="600">Amazon</text>
      <text x="158" y="25" fill="#4DA3FF" font-size="7.5">TYPE</text>
    </g>
    <g transform="translate(16,122)">
      <rect width="174" height="40" rx="9" fill="#14171C" stroke="#2A2E35"/>
      <rect x="6" y="10" width="3" height="20" rx="1.5" fill="#4DA3FF"/>
      <text x="15" y="17" fill="#6E7682" font-size="8">USER</text>
      <text x="15" y="32" fill="#FFFFFF" font-size="11">shubh@gmail.com</text>
      <text x="158" y="25" fill="#4DA3FF" font-size="7.5">TYPE</text>
    </g>
    <g transform="translate(16,168)">
      <rect width="174" height="40" rx="9" fill="#14171C" stroke="#2A2E35"/>
      <rect x="6" y="10" width="3" height="20" rx="1.5" fill="#4DA3FF"/>
      <text x="15" y="17" fill="#6E7682" font-size="8">PASS</text>
      <text x="15" y="33" fill="#FFFFFF" font-size="14" letter-spacing="1.5">••••••••</text>
      <text x="156" y="25" fill="#4DA3FF" font-size="7.5">SHOW</text>
    </g>

    <!-- action bar -->
    <g transform="translate(16,216)">
      <rect width="54" height="30" rx="8" fill="#14171C" stroke="#4DA3FF"/>
      <text x="27" y="20" fill="#4DA3FF" font-size="10" text-anchor="middle" font-weight="700">EDIT</text>
      <rect x="60" width="54" height="30" rx="8" fill="#14171C" stroke="#F23030"/>
      <path d="M87 35 C 80 29 80 22 84.5 22 C 87 22 87 25 87 25 C 87 25 87 22 89.5 22 C 94 22 94 29 87 35 Z" transform="translate(0,-7)" fill="#F23030"/>
      <rect x="120" width="54" height="30" rx="8" fill="#14171C" stroke="#F23030"/>
      <text x="147" y="20" fill="#F23030" font-size="9.5" text-anchor="middle" font-weight="700">DELETE</text>
    </g>
  </g>
  <text x="627" y="312" fill="#8C8C8C" font-size="12" text-anchor="middle" font-weight="600">Detail · tap a field to type it</text>

  <!-- caption -->
  <text x="380" y="344" fill="#5A6672" font-size="11" text-anchor="middle">368 × 448 AMOLED · hand-drawn UI · no LVGL</text>
</svg>
